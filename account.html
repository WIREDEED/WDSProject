<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dry Cleaning that's Fresh and Easy | WDS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="logo-header">
    <div class="site-mark" aria-label="WDS">WDS</div>
    <h1>Dry Cleaning that's Fresh and Easy</h1>
    <p>Update your profile information and account password.</p>
  </header>

  <nav class="main-nav">
    <a href="/">Home</a>
    <a href="/start-order">Start Order</a>
    <a href="/faqs">FAQ</a>
    <a href="/contact">Contact</a>
    <a href="/dashboard" data-auth-link>Dashboard</a>
  </nav>

  <section class="hero">
    <div class="hero-card">
      <form class="account-form" action="/account" method="post">
        <div id="accountFormNote" class="form-note hidden" role="status" aria-live="polite"></div>

        <div class="account-grid">
          <div class="account-panel">
            <span class="eyebrow">Profile</span>
            <h2>Your information</h2>

            <div class="form-grid">
              <div class="field-group full">
                <label for="accountName">Full Name</label>
                <input id="accountName" name="accountName" type="text" value="">
              </div>

              <div class="field-group">
                <label for="accountPhone">Phone Number</label>
                <input id="accountPhone" name="accountPhone" type="tel" value="" data-format="phone">
              </div>

              <div class="field-group">
                <label for="accountEmail">Email Address</label>
                <input id="accountEmail" name="accountEmail" type="email" value="">
              </div>

              <div class="field-group full">
                <label for="accountPassword">Update Password</label>
                <input id="accountPassword" name="accountPassword" type="password" placeholder="Enter a new password if needed" autocomplete="new-password" minlength="6">
              </div>
            </div>
          </div>
        </div>

        <div class="button-group" style="margin-top: 20px;">
          <button class="btn" type="submit">Save Account Settings</button>
        </div>
      </form>
    </div>
  </section>

  <footer>
    <p>(c) 2026 WDS: Wash &amp; Drycleaning Services | IT461L Project</p>
  </footer>
  <script>
    const accountParams = new URLSearchParams(window.location.search);

    const accountSuccessMessages = {
      "1": "Your account changes were saved."
    };
    const accountSuccessMessage = accountSuccessMessages[accountParams.get("success")];

    if (accountSuccessMessage) {
      const successNote = document.createElement("div");
      successNote.className = "form-note";
      successNote.textContent = accountSuccessMessage;
      document.querySelector(".hero-card")?.prepend(successNote);
    }

  </script>
  <script src="app.js"></script>
</body>
</html>
